<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps To-Do App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; background: #f4f4f4; }
        h1 { color: #2c3e50; }
        ul { list-style: none; padding: 0; }
        li { background: white; margin: 8px 0; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
        a { color: #e74c3c; text-decoration: none; }
        input[type=text] { width: 70%; padding: 8px; }
        button { padding: 8px 12px; background: #2980b9; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>📝 DevOps To-Do App</h1>
    <form action="/add" method="POST">
        <input type="text" name="task" placeholder="New task..." required>
        <button type="submit">Add</button>
    </form>
    <ul>
        {% for task in tasks %}
        <li>{{ task }} <a href="/delete/{{ loop.index0 }}">✖</a></li>
        {% endfor %}
    </ul>
</body>
</html>
