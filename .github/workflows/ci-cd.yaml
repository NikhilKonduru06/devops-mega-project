name: CI-CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: devops-todo-app

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run basic tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          cd app
          python -c "
          from app import app
          c = app.test_client()
          assert c.get('/health').status_code == 200
          assert c.get('/').status_code == 200
          print('Tests passed')
          "

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-todo-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-todo-app:${{ github.sha }}

      - name: Update Kubernetes manifest with new image tag
        run: |
          sed -i "s|image: .*devops-todo-app:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/devops-todo-app:${{ github.sha }}|" k8s/deployment.yaml

      - name: Commit updated manifest (GitOps trigger for ArgoCD)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}" || echo "No changes to commit"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done
